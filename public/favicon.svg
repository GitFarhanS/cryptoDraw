<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="cryptography favicon">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#g)"/>

  <!-- Stylized 'C' for crypto, behind the lock -->
  <path d="M44 32a12 12 0 1 1-12-12" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>

  <!-- Lock body -->
  <rect x="18" y="26" width="28" height="18" rx="3" fill="#ffffff" opacity="0.98"/>

  <!-- Shackle -->
  <path d="M26 28a6 6 0 0 1 12 0v2" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Keyhole -->
  <circle cx="32" cy="35" r="2.6" fill="#0b1220"/>
  <rect x="31.2" y="37.2" width="1.6" height="3.6" rx="0.8" fill="#0b1220"/>

  <!-- Subtle circuit traces to suggest cryptography -->
  <g fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25" stroke-linecap="round">
    <path d="M8 16h6"/>
    <path d="M50 48h6"/>
    <path d="M12 18v6"/>
    <path d="M52 46v6"/>
    <path d="M10 22c6 6 18 6 26 4"/>
  </g>
</svg>

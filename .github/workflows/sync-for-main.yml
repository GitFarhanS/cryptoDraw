name: Sync cryptodraw-for-main from cryptodraw-raw

on:
  push:
    branches:
      - cryptodraw-raw
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Snapshot this commit onto cryptodraw-for-main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git fetch origin cryptodraw-for-main || true

          if git show-ref --verify --quiet refs/remotes/origin/cryptodraw-for-main; then
            git checkout -B cryptodraw-for-main origin/cryptodraw-for-main
          else
            git checkout -B cryptodraw-for-main origin/main
          fi

          git checkout "${GITHUB_SHA}" -- .
          git add -A

          if git diff --staged --quiet; then
            echo "No changes; cryptodraw-for-main already matches this tree."
            exit 0
          fi

          git commit -m "Sync snapshot from cryptodraw-raw (${GITHUB_SHA:0:7})"
          git push origin cryptodraw-for-main
